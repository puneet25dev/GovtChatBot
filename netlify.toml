[build]
command = "npm run build"
publish = "dist"

[dev]
command = "npm run dev"
port = 5173

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/:splat"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[context.production.environment]
VITE_API_URL = "https://govtchatbot-api.onrender.com"

[context.deploy-preview.environment]
VITE_API_URL = "https://govtchatbot-api.onrender.com"

[context.branch-deploy.environment]
VITE_API_URL = "https://govtchatbot-api.onrender.com"
